body:
  text: 周大將軍延壽公碑頌夫真源澄寂沖趣虛玄非可言寄會通筌致是以釋迦應生王宮救昏迷於大娑羅示群品之無常自尒迄今邈餘千載純風潛遏道喪薨淪用使凝塵翳於黔垢穢於凡俗自非識慧幽明洞監八解安能樹善因於火宅建般若於冥津矣使持節大將軍大都督勳州汾州絳州晉州建州王葉城城頭城辟城樂昌城姚襄城諸軍事勳州刺史延壽郡開國公万紐于寔志性沈簡器度寬雅懷仁納文翁未必比其能謙恭節儉四知焉得返其受邊事夷望旗喪氣恩被北狄則繈負雲歸民飲惠化咸詠甘棠之風人寔咸歌來之美昔邵奭翼周絳侯征漠方之於今未足踰也公雖位亟旦五等寄意道心妙域知貪蛇如幻不保全於夙霄娛遊永夜豈待明於昧風防諸貴鄉城耆老訪地祇洹式建靈塔若迺汾水逕其陽似熙連之往諒山北等耆闍之鬱盛皇帝陛下福洽人天威加四海貫萬國於宇宙納蒼生於覆載大冢宰晉國公之勞王牟伊旦光讚幽遐敷揚妙軌非銘金石將何以則不述景行芳音莫著睹茲休烈敢為之頌曰若稽古如是我聞如如本絕茫茫已分有佛有法為皇為君聖寔廣運大智普播其溫如日其慧如雲道心惟遠禪念以懃牢籠軒瑣影響彌文有法大士為王爪臣菩登一子功參十人情超海岸道濟河津開沙兜府守罔稱神忠為令德善作福因弘茲佛日會此堯辰丹楹已構戴壁斯陳奉資聖帝成我能仁大周保定元年歲次辛巳三月壬午朔十日辛卯敬造
